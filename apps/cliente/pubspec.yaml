name: taller_cliente
description: Portal público para clientes — informes de inspección y presupuestos.
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navegación
  go_router: ^13.2.0

  # Modelos inmutables y serialización
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # HTTP
  dio: ^5.4.3+1

  # Abrir PDF en navegador
  url_launcher: ^6.3.0

  # UI
  cupertino_icons: ^1.0.8
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10
  custom_lint: ^0.6.4

flutter:
  uses-material-design: true
