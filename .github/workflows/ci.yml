name: CI

# ============================================================
# Corre en cada push a main/develop y en cada PR a main.
# Jobs paralelos: lint backend, tests backend, análisis Flutter.
# ============================================================

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------------------------
  # Backend — Lint (ruff + mypy)
  # ----------------------------------------------------------
  lint-backend:
    name: "Backend · Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff — lint
        run: ruff check . --output-format=github

      - name: Ruff — format check
        run: ruff format --check .

      - name: Mypy — type check
        run: mypy app/

  # ----------------------------------------------------------
  # Backend — Tests con cobertura mínima 80%
  # ----------------------------------------------------------
  test-backend:
    name: "Backend · Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          pytest tests/ \
            --tb=short \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  # ----------------------------------------------------------
  # Flutter — Portal del Cliente (análisis + formato)
  # ----------------------------------------------------------
  analyze-flutter-cliente:
    name: "Flutter Cliente · Analyze"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cliente

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get --suppress-analytics

      - name: Generate code (Freezed / json_serializable)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Flutter analyze
        run: flutter analyze

      - name: Dart format check
        run: dart format --set-exit-if-changed .

  # ----------------------------------------------------------
  # Resultado final (referenciado por deploy workflows)
  # ----------------------------------------------------------
  ci-success:
    name: "CI · Passed"
    runs-on: ubuntu-latest
    needs: [lint-backend, test-backend, analyze-flutter-cliente]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.lint-backend.result }}" != "success" ||
                "${{ needs.test-backend.result }}" != "success" ||
                "${{ needs.analyze-flutter-cliente.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed ✓"
